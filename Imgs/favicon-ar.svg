<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0711;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a0d0d;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle with gradient -->
  <circle cx="64" cy="64" r="64" fill="url(#faviconGradient)" />

  <!-- Accent circle behind text -->
  <circle cx="64" cy="64" r="58" fill="none" stroke="#ff8c00" stroke-width="2" opacity="0.6" />

  <!-- AR text -->
  <text x="64" y="80" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="56" font-weight="700" fill="#ff8c00" text-anchor="middle" letter-spacing="-1">
    AR
  </text>
</svg>